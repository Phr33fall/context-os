    <text x="946" y="428" fill="#d9e0ec" font-size="19">• Local checks passed.</text>
    <text x="946" y="464" fill="#d9e0ec" font-size="19">• Git status clean.</text>
    <text x="946" y="500" fill="#d9e0ec" font-size="19">• Handover indexed.</text>

